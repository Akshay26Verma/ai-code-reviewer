version: '3.8'

services:
  bifrost:
    image: getbifrost/bifrost:latest
    ports:
      - "8080:8080"
    volumes:
      - ./infra/bifrost/bifrost.yaml:/app/bifrost.yaml
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
    command: ["-config", "/app/bifrost.yaml"]

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    volumes:
      - redis-data:/data

  localstack:
    image: localstack/localstack:latest
    ports:
      - "127.0.0.1:4566:4566"
    environment:
      - SERVICES=s3
      - AWS_DEFAULT_REGION=us-east-1
    volumes:
      - ../tmp/localstack-data:/var/lib/localstack

volumes:
  redis-data:
