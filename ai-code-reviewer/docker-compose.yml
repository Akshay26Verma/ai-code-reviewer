version: '3.8'

services:
  bifrost:
    image: getbifrost/bifrost:latest
    ports:
      - "8080:8080"
    volumes:
      - ./infra/bifrost/bifrost.yaml:/app/bifrost.yaml
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
    command: ["-config", "/app/bifrost.yaml"]

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    volumes:
      - redis-data:/data

  localstack:
    image: localstack/localstack:latest
    ports:
      - "127.0.0.1:4566:4566"
    environment:
      - SERVICES=s3
      - AWS_DEFAULT_REGION=us-east-1
    volumes:
      - ./tmp/localstack-data:/var/lib/localstack

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 5s
      retries: 5

  neo4j:
    image: neo4j:5-community
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/password
    volumes:
      - neo4j-data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  knowledge-graph:
    build:
      context: .
      dockerfile: apps/intelligence/knowledge-graph/Dockerfile
    ports:
      - "3001:3001"
    env_file:
      - apps/intelligence/knowledge-graph/.env
    environment:
      PORT: "3001"
    depends_on:
      neo4j:
        condition: service_healthy
      redis:
        condition: service_healthy

  code-indexer:
    build:
      context: .
      dockerfile: apps/intelligence/code-indexer/Dockerfile
    ports:
      - "3000:3000"
    env_file:
      - apps/intelligence/code-indexer/.env
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
      knowledge-graph:
        condition: service_started

  webhook-service:
    build:
      context: .
      dockerfile: apps/ingestion/webhook-service/Dockerfile
    ports:
      - "3002:3002"
    env_file:
      - apps/ingestion/webhook-service/.env
    environment:
      PORT: "3002"
    depends_on:
      kafka:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ai_code_reviewer
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  api-gateway:
    build:
      context: .
      dockerfile: apps/ingestion/api-gateway/Dockerfile
    ports:
      - "3003:3003"
    env_file:
      - apps/ingestion/api-gateway/.env
    environment:
      PORT: "3003"
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  dashboard:
    build:
      context: .
      dockerfile: apps/ingestion/dashboard/Dockerfile
    ports:
      - "3004:3004"
    env_file:
      - apps/ingestion/dashboard/.env
    environment:
      PORT: "3004"
    depends_on:
      api-gateway:
        condition: service_started

volumes:
  redis-data:
  neo4j-data:
  postgres-data:
